name: device_health_monitor
description: "A system health monitoring dashboard for desktop."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_device_info_plus: ^0.3.1
  connectivity_plus: ^6.0.3
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
