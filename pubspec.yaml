name: device_health_monitor
description: "A system health monitoring dashboard for desktop."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_device_info_plus: ^0.3.1
  connectivity_plus: ^6.0.3
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  ffi: ^2.1.0
  http: ^0.13.6
  speed_test_port: ^1.0.4
  camera: ^0.11.1
  camera_windows: ^0.2.1+10
  record: ^4.4.4
  audioplayers: ^6.1.1
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/test_audio.mp3
